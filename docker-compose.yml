services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: hunkwise
      POSTGRES_USER: hunkwise
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hunkwise-local-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hunkwise -d hunkwise"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgres://hunkwise:${POSTGRES_PASSWORD:-hunkwise-local-only}@postgres:5432/hunkwise
      DATABASE_SSL_MODE: disable
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?Set APP_ENCRYPTION_KEY to a base64-encoded 32-byte key}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET:-hunkwise-local-webhook-secret}
    command: ["sh", "-c", "node packages/db/dist/migrate.js && node apps/api/dist/main.js"]
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 4s
      retries: 10
    init: true
    restart: unless-stopped

volumes:
  postgres-data:
